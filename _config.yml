# Site settings
include: ['_pages']
title: mikedanko.me
name: Mike Danko
email: mike@l4m3.com
description: >-
  This is the website for Mike Danko, a software developer in the Columbus Ohio Area.
  I'm also a father, a radio amateur (KD8ORQ), and a musician.
baseurl: ""
url: "https://mikedanko.me"
repository: skord/kd8orqnet

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Social links (used in footer)
social_links:
  - title: Mastodon
    url: https://mastodon.social/@mikedanko
    rel: me
  - title: GitHub
    url: https://github.com/skord
  - title: YouTube
    url: https://www.youtube.com/mikedanko
  - title: Soundcloud
    url: https://soundcloud.com/thumplexbumpitron
  - title: Twitch
    url: https://www.twitch.tv/thumplexbumpitron
  - title: Email
    url: mailto:mike@l4m3.com

# Build settings
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

# Collections
collections:
  recipes:
    output: true
    permalink: /:collection/:name/

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor/
  - vendor/bundle/
  - .vendor/
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - bin/
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README
  - tmp
  - .do/
  - CLAUDE.md
  - DESIGN.md
  - mikedanko-clean.html

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  # _recipes
  - scope:
      path: ""
      type: recipes
    values:
      layout: page
