<footer class="footer">
  <div class="footer-socials">
    {% for link in site.social_links %}
    <a href="{{ link.url }}"{% if link.rel %} rel="{{ link.rel }}"{% endif %}>{{ link.title }}</a>
    {% endfor %}
  </div>
  <p class="footer-copy">&copy; {{ site.time | date: '%Y' }} {{ site.name }}. Columbus, OH. KD8ORQ.</p>
</footer>
