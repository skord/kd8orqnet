---
layout: default
---

<div class="page-content">
  {{ content }}
</div>

<ul class="recipe-grid">
  {% assign sorted_recipes = site.recipes | sort: 'title' %}
  {% for recipe in sorted_recipes %}
  <li>
    <a href="{{ recipe.url | relative_url }}" class="recipe-card">
      {% if recipe.image %}
      <img src="{{ recipe.image | relative_url }}" alt="{{ recipe.title | escape }}" class="recipe-photo" loading="lazy">
      {% else %}
      <span class="recipe-photo recipe-photo-empty" aria-hidden="true"></span>
      {% endif %}
      <span class="recipe-card-title">{{ recipe.title }}</span>
    </a>
  </li>
  {% endfor %}
</ul>
